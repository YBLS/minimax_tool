# ============================================================
#  MiniMax Tool — single-host production stack
#
#  All configuration comes from `config/database.yaml` (mounted into
#  the container at /app/config/database.yaml). The .env file is no
#  longer used. See docs/DEPLOY.md for the full setup walkthrough.
#
#  Required host files before `docker compose up`:
#    - config/database.yaml    (DB connection; gitignored)
#    - .master_key             (Fernet key; generated on first run)
#
#  Usage:   cp config/database.yaml.example config/database.yaml
#           $EDITOR config/database.yaml   # set host + password
#           touch .master_key && chmod 600 .master_key
#           docker compose up --build
#  Stop:    docker compose down
#  Reset:   docker compose down -v   (wipes uploads; external DB untouched)
# ============================================================

name: minimax

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # No DB healthcheck gate — the app talks to an external Postgres, so the
    # operator is responsible for making sure that DB is up before `up`.
    environment:
      HOST: 0.0.0.0
      PORT: 9060
      DEBUG: "false"
      # The database config (host, port, user, password, name, pool, ssl)
      # is read from /app/config/database.yaml — mounted read-only from
      # the host below. No env-var indirection; the YAML is the single
      # source of truth and the password lives in the file itself.
      # The application refuses to start if the YAML is missing or the
      # password resolves to an empty string.
      #
      # Supply an explicit master key in production. If omitted, a fresh
      # `.master_key` file is auto-generated on first run AND LOST when
      # the container is recreated — at which point all stored API keys
      # become unreadable. So: either pin a key, or persist a host-
      # mounted `.master_key` (see the volumes section below).
      # MASTER_KEY:
      REQUEST_TIMEOUT: "180"
      UPLOAD_DIR: /app/uploads
      STATIC_DIR: /app/static
    ports:
      - "${PORT:-9060}:9060"
    volumes:
      # Persist generated artifacts.
      - minimax_uploads:/app/uploads
      # Mount the database config read-only. The path inside the
      # container matches DB_CONFIG_FILE above. Compose fails fast
      # at startup if the file is missing (because the bind mount
      # references a file that doesn't exist on the host).
      - ./config/database.yaml:/app/config/database.yaml:ro
      # Persist the master key across container recreations. Mount a host
      # file (created by the operator — `touch .master_key && chmod 600`).
      # On first run, the app sees a 0-byte file and writes a fresh key
      # to it; on subsequent runs the host file is non-empty and the app
      # reads it. Either way, the key survives `docker compose down` /
      # `up` cycles.
      - ./.master_key:/app/.master_key
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:9060/api/health', timeout=2).status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  minimax_uploads:
